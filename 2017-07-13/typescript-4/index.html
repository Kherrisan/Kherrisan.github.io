<time datetime="2017-07-13T03:22:11.000Z" itemprop="datePublished">2017-07-13</time></div><div class="article-category"><i class="fas fa-archive"></i> <a class="category-link" href="/categories/Typescript/">Typescript</a></div></div></header><div class="content" itemprop="articleBody"><a id="more"></a><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br></pre></td><td class="code"><pre><span class="line">class Greeter{</span><br><span class="line">    greeting:string;</span><br><span class="line">    constructor(message:string){</span><br><span class="line">        this.greeting=message;</span><br><span class="line">    }</span><br><span class="line">    greet(){</span><br><span class="line">        return "Hello,"+this.greeting;</span><br><span class="line">    }</span><br><span class="line">}</span><br><span class="line"></span><br><span class="line">let greeter=new Greeter("World");</span><br><span class="line"></span><br><span class="line">abstract class Animal{</span><br><span class="line">    name:string;</span><br><span class="line">    constructor(name:string){this.name=name;}</span><br><span class="line">    move(distanceInMeters:number=0){</span><br><span class="line">        console.log(`${this.name} moved ${distanceInMeters}m`);</span><br><span class="line">    }</span><br><span class="line">}</span><br><span class="line"></span><br><span class="line">class Snake extends Animal{</span><br><span class="line">    // constructor(name:string){super(name);}</span><br><span class="line">    move(distenceInMeters=5){</span><br><span class="line">        console.log("Slithering...");</span><br><span class="line">        super.move(distenceInMeters);</span><br><span class="line">    }</span><br><span class="line">}</span><br><span class="line"></span><br><span class="line">class Horse extends Animal{</span><br><span class="line">    // constructor(name:string){super(name);}</span><br><span class="line">    move(distanceInMeters=45){</span><br><span class="line">        console.log("Galloping...");</span><br><span class="line">        super.move(distanceInMeters);</span><br><span class="line">    }</span><br><span class="line">}</span><br><span class="line"></span><br><span class="line">let sam=new Snake("Sammy the Python");</span><br><span class="line">let tom:Animal=new Horse("Tommy the Palomino"); //有一点多态的感觉咯</span><br><span class="line"></span><br><span class="line">sam.move();</span><br><span class="line">tom.move();</span><br><span class="line"></span><br><span class="line">class Person{</span><br><span class="line">    protected readonly name:string;</span><br><span class="line">    protected constructor(name:string){this.name=name;}</span><br><span class="line">}</span><br><span class="line"></span><br><span class="line">class Employee extends Person{</span><br><span class="line">    private _department:string;</span><br><span class="line">    constructor(name:string,department:string){</span><br><span class="line">        super(name);</span><br><span class="line">        this._department=department;</span><br><span class="line">    }</span><br><span class="line">    public getElevatorPitch(){</span><br><span class="line">        return `Hello,My Name is ${this.name} and I work in ${this._department}.`;</span><br><span class="line">    }</span><br><span class="line">    public get department():string{</span><br><span class="line">        return this._department;</span><br><span class="line">    }</span><br><span class="line">    public set department(newDepartment:string){</span><br><span class="line">        if(newDepartment==""){</span><br><span class="line">            console.log("Error:Unauthorized update of employee");</span><br><span class="line">        }else{</span><br><span class="line">            this._department=newDepartment;</span><br><span class="line">        }</span><br><span class="line">    }</span><br><span class="line">}</span><br><span class="line"></span><br><span class="line">let howard=new Employee("Howard","Sales");</span><br><span class="line">howard.department="";</span><br><span class="line">howard.department="Tech";</span><br><span class="line"></span><br><span class="line">class Grid{</span><br><span class="line">    static origin={x:0,y:0};</span><br><span class="line">    calculateDistanceFromOrigin(point:{x:number,y:number}){</span><br><span class="line">        let xDist=(point.x-Grid.origin.x);</span><br><span class="line">        let yDist=(point.y-Grid.origin.y);</span><br><span class="line">        return Math.sqrt(xDist*xDist+yDist*yDist)/this.scale;</span><br><span class="line">    }</span><br><span class="line">    constructor(public scale:number){}</span><br><span class="line">}</span><br></pre></td></tr></table></figure><p>嗯这一节的代码就看起来舒服多了，和java几乎没什么区别。get和set函数也是形如C#中的存取器的写法。 忽然就不想写什么了。</p></div></article><div id="footer-post-container"><div id="footer-post"><div id="nav-footer" style="display: none"><ul><li><a href="/">首页</a></li><li><a href="/about/">关于</a></li><li><a href="/archives/">归档</a></li><li><a href="/projects_url">项目</a></li></ul></div><div id="toc-footer" style="display: none"></div><div id="share-footer" style="display: none"><ul><li><a class="icon" href="http://www.facebook.com/sharer.php?u=https://blog.dokyme.cn/2017-07-13/typescript-4/" target="_blank" rel="noopener"><i class="fab fa-facebook fa-lg" aria-hidden="true"></i></a></li>
