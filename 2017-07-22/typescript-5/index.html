ass="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br></pre></td><td class="code"><pre><span class="line">function add(x: number, y: number): number {</span><br><span class="line">  return x + y;</span><br><span class="line">}</span><br><span class="line"></span><br><span class="line">let myAdd: (x: number, y: number) => number = function(</span><br><span class="line">  x: number,</span><br><span class="line">  y: number</span><br><span class="line">): number {</span><br><span class="line">  return x + y;</span><br><span class="line">};</span><br><span class="line"></span><br><span class="line">function buildName(firstName: string, lastName?: string) {</span><br><span class="line">  // function buildName(firstName:string,lastName="Smith"){</span><br><span class="line">  if (lastName) return firstName + " " + lastName;</span><br><span class="line">  else return firstName;</span><br><span class="line">}</span><br><span class="line"></span><br><span class="line">let result1 = buildName("Zou", "Dikai");</span><br><span class="line">let result2 = buildName("ZouZOU");</span><br><span class="line"></span><br><span class="line">function buildName_2(firstName: string, ...restOfName: string[]) {</span><br><span class="line">  return firstName + " " + restOfName.join(" ");</span><br><span class="line">}</span><br><span class="line"></span><br><span class="line">let buildNameFun: (fname: string, ...rest: string[]) => string = buildName_2;</span><br><span class="line"></span><br><span class="line">interface Card {</span><br><span class="line">  suit: string;</span><br><span class="line">  card: number;</span><br><span class="line">}</span><br><span class="line"></span><br><span class="line">interface Deck {</span><br><span class="line">  suits: string[];</span><br><span class="line">  card: number[];</span><br><span class="line">  createCardPicker(this: Deck): () => Card;</span><br><span class="line">}</span><br><span class="line"></span><br><span class="line">let deck: Deck = {</span><br><span class="line">  suits: ["heart", "spades", "clubs", "diamonds"],</span><br><span class="line">  cards: Array(52),</span><br><span class="line">  createCardPicker: function(this: Deck) {</span><br><span class="line">    return () => {</span><br><span class="line">      let pickedCard = Math.floor(Math.random() * 52);</span><br><span class="line">      let pickedSuit = Math.floor(pickedCard / 13);</span><br><span class="line"></span><br><span class="line">      return { suit: this.suits[pickedSuit], card: pickedCard % 13 };</span><br><span class="line">    };</span><br><span class="line">  }</span><br><span class="line">};</span><br><span class="line"></span><br><span class="line">let suits = ["hearts", "spades", "clubs", "diamonds"];</span><br><span class="line"></span><br><span class="line">function pickCard(x: { suit: string; card: number }[]): number;</span><br><span class="line">function pickCard(x: number): { suit: string; card: number };</span><br><span class="line">function pickCard(x): any {</span><br><span class="line">  if (typeof x == "object") {</span><br><span class="line">    let pickedCard = Math.floor(Math.random() * x.length);</span><br><span class="line">    return pickedCard;</span><br><span class="line">  } else if (typeof x == "number") {</span><br><span class="line">    let pickedSuit = Math.floor(x / 13);</span><br><span class="line">    return { suit: suits[pickedSuit], card: x % 13 };</span><br><span class="line">  }</span><br><span class="line">}</span><br><span class="line"></span><br><span class="line">let myDeck = [</span><br><span class="line">  { suit: "diamonds", card: 2 },</span><br><span class="line">  { suit: "spades", card: 10 },</span><br><span class="line">  { suit: "hearts", card: 4 }</span><br><span class="line">];</span><br><span class="line">let pickedCard1 = myDeck[pickCard(myDeck)];</span><br><span class="line">let pickedCard2 = pickCard(15);</span><br></pre></td></tr></table></figure><p>总结一下，总共四部分： 1. 函数的类型，原型。 2. 可选参数，默认参数，变长参数。 3. this的坑。 4. 函数重载。</p></div></article><div id="footer-post-container"><div id="footer-post"><div id="nav-footer" style="display: none"><ul><li><a href="/">首页</a></li><li><a href="/about/">关于</a></li><li><a href="/archives/">归档</a></li><li><a href="/projects_url">项目</a></li></ul></div><div id="toc-footer" style="display: none"></div><div id="share-footer" style="display: none"><ul><li><a class="icon" href="http://www.facebook.com/sharer.php?u=https://blog.dokyme.cn/2017-07-22/typescript-5/" target="_blank" rel="noopener"><i class="fab fa-facebook fa-lg" aria-hidden="true"></i></a></li><li><a class="icon" href="https://twitter.com/share?url=https://blog.dokyme.cn/2017-07-22/typescript-5/&text=Typescript 函数" target="_blank" rel="noopener"><i class="fab fa-twitter fa-lg" aria-hidden="true"></i></a></li><li><a class="icon" href="http://www.linkedin.com/shareArticle?url=https://blog.dokyme.cn/2017-07-22/typescript-5/&title=Typescript 函数" target="_blank" rel="noopener"><i class="fab fa-linkedin fa-lg" aria-hidden="true"></i></a></li><li><a class="icon" href="https://pinterest.com/pin/create/bookmarklet/?url=https://blog.dokyme.cn/2017-07-22/typescript-5/&is_vide
