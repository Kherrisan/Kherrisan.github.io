language: node_js
node_js: 
  - 11
cache:
  apt: true
  directories:
  - node_modules
before_install:
- openssl aes-256-cbc -K $encrypted_f9f5593bb07d_key -iv $encrypted_f9f5593bb07d_iv
  -in id_rsa.enc -out ~/.ssh/id_rsa -d
- chmod 600 ~/.ssh/id_rsa
- echo -e "Host 47.96.224.246\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config
- export TZ='Asia/Shanghai'
- npm install natives
- npm install -g hexo-cli hexo gulp
install:
- npm install
before_script:
- git config user.name "Kherrisan"
- git config user.email "zdkscope@outlook.com"
- sed -i'' "s~git@github.com:Kherrisan/Kherrisan.github.io.git~https://${REPO_TOKEN}:x-oauth-basic@github.com/Kherrisan/Kherrisan.github.io.git~"
  _config.yml
script:
- hexo clean
- gulp
- hexo generate
- gulp
after_success:
- hexo deploy
- scp -o stricthostkeychecking=no -r public root@47.96.224.246:/var/www
branches:
  only:
  - hexo
env:
  global:
  - secure: 
addons:
  ssh_known_hosts: 47.96.224.246